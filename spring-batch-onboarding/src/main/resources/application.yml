spring:
  application:
    name: batch-flow

  # H2 인메모리 + MS-SQL 호환 모드 (실무 DB가 MS-SQL — TestCraft 모듈과 동일 정책)
  # DB명을 batchdb로 분리: 같은 JVM에서 타 모듈 테스트와 인메모리 DB가 섞이지 않도록
  datasource:
    url: jdbc:h2:mem:batchdb;MODE=MSSQLServer;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # schema.sql / data.sql 자동 실행 (도메인 테이블 — Step 6에서 도입)
  sql:
    init:
      mode: embedded
      encoding: UTF-8   # Windows cp949 함정 방지 (TestCraft Step 3의 교훈)

  # Spring Batch 설정
  batch:
    jdbc:
      initialize-schema: embedded  # BATCH_* 메타데이터 테이블 6종 자동 생성 (embedded DB 한정)
    job:
      enabled: false  # 애플리케이션 기동 시 Job 자동 실행 금지 (테스트/수동 실행만) — 필수!

# 로깅 설정
logging:
  level:
    com.batchflow: DEBUG
    org.springframework.batch: INFO
