spring:
  application:
    name: batch-flow-test

  # 테스트 전용 — main과 동일하게 MS-SQL 호환 모드 유지
  datasource:
    url: jdbc:h2:mem:batchdb;MODE=MSSQLServer;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: embedded
      encoding: UTF-8

  batch:
    jdbc:
      initialize-schema: embedded
    job:
      enabled: false

logging:
  level:
    com.batchflow: DEBUG
    org.springframework.batch: INFO
