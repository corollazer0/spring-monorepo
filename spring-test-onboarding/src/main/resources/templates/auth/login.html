<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('로그인')"></head>
<body>
<header th:replace="fragments/layout :: header"></header>

<main>
    <h1>로그인</h1>

    <!-- 가입 직후 안내 (redirect:/login?signup) -->
    <p class="info" th:if="${param.signup}">🎉 가입이 완료되었습니다. 로그인해주세요.</p>
    <!-- 로그인 실패 안내 (failureHandler가 /login?error 로 보낸다) -->
    <p class="error" th:if="${param.error}">아이디 또는 비밀번호가 올바르지 않습니다.</p>

    <!--
      이 폼의 action(POST /login)을 처리하는 컨트롤러는 없다!
      Spring Security의 UsernamePasswordAuthenticationFilter가 가로채 처리한다.
      input의 name(username/password)은 Security의 기본 파라미터 이름과 일치해야 한다.
    -->
    <form th:action="@{/login}" method="post">
        <label for="username">아이디</label>
        <input type="text" id="username" name="username" placeholder="writer1">

        <label for="password">비밀번호</label>
        <input type="password" id="password" name="password" placeholder="spring123!">

        <button type="submit">로그인</button>
    </form>

    <p class="muted">계정이 없으신가요? <a th:href="@{/signup}">회원가입</a></p>
    <p class="muted">시드 계정: writer1 / writer2 / admin (비밀번호 모두 spring123!)</p>
</main>
</body>
</html>
