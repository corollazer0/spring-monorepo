<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('회원가입')"></head>
<body>
<header th:replace="fragments/layout :: header"></header>

<main>
    <h1>회원가입</h1>

    <form th:action="@{/signup}" th:object="${memberSignupRequest}" method="post">
        <!-- 비즈니스 검증 실패(중복 아이디, 비밀번호 정책)는 글로벌 에러로 표시된다 -->
        <p class="error" th:if="${#fields.hasGlobalErrors()}"
           th:each="err : ${#fields.globalErrors()}" th:text="${err}">가입 실패 사유</p>

        <label for="username">아이디 (영문 소문자/숫자 4~20자)</label>
        <input type="text" id="username" th:field="*{username}">
        <p class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">아이디 에러</p>

        <label for="password">비밀번호 (8자 이상, 숫자+특수문자 포함)</label>
        <input type="password" id="password" th:field="*{password}">
        <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">비밀번호 에러</p>

        <label for="nickname">닉네임 (2~10자)</label>
        <input type="text" id="nickname" th:field="*{nickname}">
        <p class="error" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">닉네임 에러</p>

        <button type="submit">가입하기</button>
        <a th:href="@{/login}">취소</a>
    </form>
</main>
</body>
</html>
