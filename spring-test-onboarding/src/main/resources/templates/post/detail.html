<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/layout :: head('글 상세')"></head>
<body>
<header th:replace="fragments/layout :: header"></header>

<main>
    <h1 th:text="${post.title}">제목</h1>
    <p class="muted">
        <span th:text="${post.writer}">writer1</span> ·
        <span th:text="${post.createdAt}">2026-01-01</span>
    </p>
    <p th:text="${post.content}" style="white-space: pre-line">내용</p>

    <h2>댓글 <span class="muted" th:text="'(' + ${#lists.size(comments)} + ')'">(0)</span></h2>
    <div class="comment" th:each="comment : ${comments}">
        <b th:text="${comment.writer}">writer2</b>
        <span class="muted" th:text="${comment.createdAt}"></span>
        <p th:text="${comment.content}">댓글 내용</p>
    </div>
    <p class="muted" th:if="${#lists.isEmpty(comments)}">첫 댓글을 남겨보세요. (댓글 작성은 REST API — POST /api/posts/{id}/comments)</p>

    <p><a th:href="@{/posts}">← 목록으로</a></p>
</main>
</body>
</html>
