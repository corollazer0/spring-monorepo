spring:
  application:
    name: web-flow-test

  # 테스트 전용 — main과 동일하게 MS-SQL 호환 모드 유지
  # @MybatisTest에서 이 URL을 쓰려면 @AutoConfigureTestDatabase(replace = Replace.NONE) 필수!
  datasource:
    url: jdbc:h2:mem:webdb;MODE=MSSQLServer;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  sql:
    init:
      mode: embedded
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mybatis/mapper/*.xml
  type-aliases-package: com.webflow
  configuration:
    map-underscore-to-camel-case: true

app:
  upload-dir: build/test-uploads   # 테스트가 디스크 어디를 더럽히는지 명시적으로

external:
  payment:
    base-url: https://pg.example.com   # 진짜 호출은 없다 — MockRestServiceServer가 가로챈다
    connect-timeout-millis: 3000
    read-timeout-millis: 5000

logging:
  level:
    com.webflow: DEBUG
